<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>WebOffice.Client</title>
    <base href="/"/>
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="css/app.css"/>
    <link rel="icon" type="image/png" href="favicon.png"/>
    <link href="WebOffice.Client.styles.css" rel="stylesheet"/>
</head>

<body>
<div id="app">
    <svg class="loading-progress">
        <circle r="40%" cx="50%" cy="50%"/>
        <circle r="40%" cx="50%" cy="50%"/>
    </svg>
    <div class="loading-progress-text"></div>
</div>

<div id="blazor-error-ui">
    An unhandled error has occurred.
    <a href="." class="reload">Reload</a>
    <span class="dismiss">🗙</span>
</div>
<script src="_framework/blazor.webassembly.js"></script>
<script src="http://localhost:8080/web-apps/apps/api/documents/api.js"></script>
<script>
    window.openEditor = function (config) {
        if (window.docEditor) {
            window.docEditor.destroyEditor();
        }

        window.docEditor = new DocsAPI.DocEditor("editor", {
            document: config.document,
            editorConfig: config.editorConfig,
            documentType: "word",
            width: "100%",
            height: "800px"
        });
    }
</script>
</body>

</html>
