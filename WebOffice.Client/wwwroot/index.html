<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebOffice</title>
    <base href="/" />
    <link href="css/app.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <div class="loading">Загрузка...</div>
    </div>

    <!-- ==================== ONLYOFFICE ==================== -->
    <!-- Меняй порт 8080 на тот, который указал в docker run -->
    <script type="text/javascript" src="http://localhost:8080/web-apps/apps/api/documents/api.js"></script>

    <script>
        // Глобальная функция, которую вызывает Blazor
        window.openEditor = function (config) {
            if (!window.DocsAPI) {
                console.error("DocsAPI не загружен!");
                return;
            }

            new DocsAPI.DocEditor("editor", {
                document: config.document,
                editorConfig: {
                    ...config.editorConfig,
                    mode: "edit",
                    user: {
                        id: "user123",
                        name: "Текущий пользователь"
                    }
                },
                height: "800px"
            });
        };
    </script>
    <!-- ==================================================== -->

    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
