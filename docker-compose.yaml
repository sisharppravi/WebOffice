services:
  minio:
    image: quay.io/minio/minio:RELEASE.2024-02-17T01-15-57Z
    container_name: minio
    ports:
      - "9000:9000"   # MinIO API
      - "9001:9001"   # MinIO Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - appnet

  onlyoffice:
    image: onlyoffice/documentserver:8.0.1
    container_name: onlyoffice
    ports:
      - "8080:80"
    environment:
      JWT_ENABLED: true
      JWT_SECRET: ${ONLYOFFICE_JWT_SECRET}
      ALLOW_PRIVATE_IP_ADDRESS: "true"
      WOPI_ENABLED: true
    volumes:
      - onlyoffice-data:/var/www/onlyoffice/Data
    networks:
      - appnet

  api:
    build:
      context: ./WebOffice.Api
      dockerfile: Dockerfile
    container_name: api
    environment:
      - ASPNETCORE_URLS=http://+:5288
      - ASPNETCORE_ENVIRONMENT=Production
    networks:
      - appnet
    restart: unless-stopped

  nginx:
    image: nginx:1.27.0-alpine
    container_name: nginx-proxy
    ports:
      - "${NGINX_PORT:-80}:80"          # если NGINX_PORT не задан → будет 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      # Монтируем опубликованную статику Blazor WASM прямо в nginx
      - ./WebOffice.Client/bin/Release/net9.0/publish/wwwroot:/usr/share/nginx/html:ro
    depends_on:
      - api
      - minio
      - onlyoffice
    networks:
      - appnet
    restart: unless-stopped

volumes:
  minio-data:
  onlyoffice-data:

networks:
  appnet:
    driver: bridge